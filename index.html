<!DOCTYPE html>
<html lang="eu">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial scale=1.0">
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>Calculadora</title>
    </head>

    <body>
        <div class="calculadora">
            <div class="display">
                <input type="text" id="screens"></input>
            </div>

             <div class="button">
                <button onclick="toDisplay('+')" class="nan">+</button>
                <button onclick="toDisplay('7')">7</button>
                <button onclick="toDisplay('8')">8</button>
                <button onclick="toDisplay('9')">9</button>
                <button onclick="toDisplay('-')" class="nan">-</button>
                <button onclick="toDisplay('4')">4</button>
                <button onclick="toDisplay('5')">5</button>
                <button onclick="toDisplay('6')">6</button>
                <button onclick="toDisplay('*')" class="nan">x</button>
                <button onclick="toDisplay('3')">3</button>
                <button onclick="toDisplay('2')">2</button>
                <button onclick="toDisplay('1')">1</button>
                <button onclick="toDisplay('/')" class="nan">%</button>
                <button onclick="resolve()" class="nan">=</button>
                <button onclick="toDisplay('0')" class=>0</button>
                <button onclick="toDisplay('.')" class="nan">.</button>
                <button onclick="clearDisplay()" class="nan">C</button>
            </div>
        </div> 
        <script src="main.js"></script>
    </body>
</html>
